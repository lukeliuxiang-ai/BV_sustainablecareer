<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百年生涯 · 影响力行动卡 | map01</title>
    <link rel="stylesheet" href="map-slide.css">
</head>
<body class="iac-blank-page">
    <div class="deck-stack map-deck">
        <div class="slide-container" id="pdf-capture-root">
            <div class="iac-wrap">
                <p class="iac-career-title" lang="zh-CN">百年生涯 <span class="iac-career-title__en" lang="en">Sustainable Career</span></p>

                <header class="iac-header">
                    <h1>影响力行动卡</h1>
                    <p class="iac-sub">从洞察到行动 · 30天影响力提升计划</p>
                </header>

                <div class="iac-meta iac-meta--with-date">
                    <div class="iac-meta-left">
                        <label class="iac-meta-label">姓名：<input class="iac-inline-input" type="text" name="user_name" autocomplete="name" aria-label="姓名"></label>
                        <label class="iac-meta-label">职位：<input class="iac-inline-input" type="text" name="user_title" autocomplete="organization-title" aria-label="职位"></label>
                    </div>
                    <div class="iac-meta-right">
                        <input class="iac-date-input" type="text" name="form_date" inputmode="numeric" aria-label="日期">
                    </div>
                </div>

                <div class="iac-table-wrap">
                    <table class="iac-table">
                        <thead>
                            <tr>
                                <th scope="col">模块</th>
                                <th scope="col">内容</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="iac-mod">我的霍兰德代码</td>
                                <td class="iac-val"><textarea class="iac-cell-textarea" rows="2" aria-label="我的霍兰德代码"></textarea></td>
                            </tr>
                            <tr>
                                <td class="iac-mod">我选择的测评建议</td>
                                <td class="iac-val"><textarea class="iac-cell-textarea" rows="2" aria-label="我选择的测评建议"></textarea></td>
                            </tr>
                            <tr>
                                <td class="iac-mod">我的30天具体行动</td>
                                <td class="iac-val"><textarea class="iac-cell-textarea" rows="2" aria-label="我的30天具体行动"></textarea></td>
                            </tr>
                            <tr>
                                <td class="iac-mod">我要影响的对象</td>
                                <td class="iac-val"><textarea class="iac-cell-textarea" rows="2" aria-label="我要影响的对象"></textarea></td>
                            </tr>
                            <tr>
                                <td class="iac-mod">我希望产生的影响</td>
                                <td class="iac-val"><textarea class="iac-cell-textarea" rows="2" aria-label="我希望产生的影响"></textarea></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="iac-actions">
                        <button type="button" class="iac-btn iac-btn--primary" id="iac-btn-confirm">确认</button>
                        <button type="button" class="iac-btn iac-btn--secondary" id="iac-btn-pdf" hidden>另存为 PDF</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var root = document.getElementById("pdf-capture-root");
            var confirmBtn = document.getElementById("iac-btn-confirm");
            var pdfBtn = document.getElementById("iac-btn-pdf");

            confirmBtn.addEventListener("click", function () {
                pdfBtn.hidden = false;
                root.classList.add("iac-form-confirmed");
            });

            pdfBtn.addEventListener("click", function () {
                window.scrollTo(0, 0);
                window.setTimeout(function () {
                    window.print();
                }, 100);
            });
        })();
    </script>
</body>
</html>
