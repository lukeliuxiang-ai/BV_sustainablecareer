<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>必维职业发展规划测评 05 | Bureau Veritas Career Development</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1e3a5f; --secondary: #2c5282; --accent: #d4af37;
            --accent-light: #f4d03f; --bv-blue: #0055a4; --bv-light: #e6f0f8;
            --bg-light: #f8fafc; --text-dark: #1a202c; --text-gray: #4a5568;
            --white: #ffffff; --ai-purple: #7c3aed; --ai-light: #ede9fe;
            --shadow: 0 10px 40px rgba(30, 58, 95, 0.1);
            --shadow-hover: 0 20px 60px rgba(30, 58, 95, 0.15);
            --p0-color: #0055a4; --p1-color: #2c5282; --p2-color: #7c3aed;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e6f0f8 100%);
            min-height: 100vh; color: var(--text-dark); overflow-x: hidden;
        }
        .container {
            max-width: 900px; margin: 0 auto; padding: 40px 20px;
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
        }
        .intro-section, .quiz-section, .result-section { animation: fadeInUp 0.6s ease-out; }
        .quiz-section, .result-section { display: none; }
        .logo {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--bv-blue), var(--primary));
            border-radius: 20px; margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; color: var(--accent); box-shadow: var(--shadow);
            position: relative; overflow: hidden; font-weight: 700;
        }
        .logo::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }
        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { font-size: 1.1rem; color: var(--text-gray); margin-bottom: 30px; font-weight: 300; }
        .context-banner {
            background: linear-gradient(135deg, var(--bv-blue), var(--secondary));
            color: white; padding: 25px 30px; border-radius: 16px;
            margin-bottom: 30px; text-align: left; box-shadow: var(--shadow);
        }
        .context-banner h3 { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .context-banner p { font-size: 0.95rem; line-height: 1.8; opacity: 0.95; margin-bottom: 10px; }
        .intro-card {
            background: var(--white); border-radius: 24px; padding: 40px;
            box-shadow: var(--shadow); margin-bottom: 30px; text-align: left;
            border: 1px solid rgba(30, 58, 95, 0.05);
        }
        .intro-card h2 { color: var(--primary); margin-bottom: 20px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .intro-card p { color: var(--text-gray); line-height: 1.8; margin-bottom: 15px; }
        .top-model {
            background: var(--bv-light); border-radius: 16px; padding: 25px;
            margin: 20px 0; border-left: 4px solid var(--bv-blue);
        }
        .top-model h4 { color: var(--bv-blue); margin-bottom: 15px; font-size: 1.1rem; }
        .top-model ul { margin-left: 20px; color: var(--text-gray); line-height: 1.8; }
        .top-model li { margin-bottom: 8px; }
        .ai-highlight {
            background: linear-gradient(135deg, var(--ai-light), #fff);
            border-left: 4px solid var(--ai-purple); padding: 20px;
            border-radius: 12px; margin: 20px 0;
        }
        .ai-highlight h4 { color: var(--ai-purple); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .ai-highlight p { color: var(--text-gray); line-height: 1.7; margin: 0; }
        .influence-highlight {
            background: linear-gradient(135deg, #e6f0f8, #fff);
            border-left: 4px solid var(--bv-blue); padding: 20px;
            border-radius: 12px; margin: 20px 0;
        }
        .influence-highlight h4 { color: var(--bv-blue); margin-bottom: 10px; font-size: 1.1rem; }
        .influence-highlight p { color: var(--text-gray); line-height: 1.7; margin: 0; }
        .vuca-note {
            background: linear-gradient(135deg, #fff9e6, #fff);
            border: 1px solid var(--accent); border-radius: 12px;
            padding: 20px; margin-top: 20px; text-align: left;
        }
        .vuca-note h4 { color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .vuca-note p { color: var(--text-gray); font-size: 0.9rem; line-height: 1.6; }
        .input-group { margin: 25px 0; text-align: left; }
        .input-group label { display: block; color: var(--primary); font-weight: 600; margin-bottom: 10px; font-size: 1rem; }
        .input-group select {
            width: 100%; padding: 15px 20px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 1rem; transition: all 0.3s ease;
            font-family: inherit; background: var(--white); cursor: pointer;
        }
        .input-group select:focus { outline: none; border-color: var(--bv-blue); box-shadow: 0 0 0 3px rgba(0, 85, 164, 0.1); }
        .radio-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .radio-card {
            flex: 1; min-width: 200px; padding: 20px; background: var(--bg-light);
            border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; text-align: center; position: relative;
        }
        .radio-card:hover { border-color: var(--bv-blue); background: #fff; transform: translateY(-2px); }
        .radio-card.selected {
            background: linear-gradient(135deg, var(--bv-blue), var(--secondary));
            color: white; border-color: var(--bv-blue);
        }
        .radio-card .radio-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; display: block; }
        .radio-card .radio-desc { font-size: 0.85rem; opacity: 0.8; line-height: 1.4; }
        .btn-primary {
            background: linear-gradient(135deg, var(--bv-blue), var(--secondary));
            color: white; border: none; padding: 16px 50px; font-size: 1.1rem;
            border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,85,164,0.3);
        }
        .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
        .question-card {
            background: var(--white); border-radius: 24px; padding: 40px 30px;
            box-shadow: var(--shadow); text-align: center;
        }
        .question-text { font-size: 1.3rem; margin-bottom: 30px; line-height: 1.6; }
        .options-container { display: flex; flex-direction: column; gap: 12px; max-width: 500px; margin: 0 auto; }
        .option-btn {
            background: var(--bg-light); border: 2px solid transparent; padding: 15px 20px;
            border-radius: 12px; cursor: pointer; text-align: left; display: flex;
            justify-content: space-between; align-items: center; transition: all 0.3s;
        }
        .option-btn:hover { background: #fff; border-color: var(--bv-blue); transform: translateX(5px); }
        .option-btn.selected { background: linear-gradient(135deg, var(--bv-blue), var(--secondary)); color: white; }
        .progress-container { background: var(--white); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--bv-blue), var(--accent)); width: 0%; transition: width 0.3s; }
        .result-code { font-size: 3rem; font-weight: 800; letter-spacing: 5px; margin: 20px 0; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .chart-container, .scores-container { background: var(--white); border-radius: 20px; padding: 20px; }
        /* 避免 Chart.js canvas 实际像素区大于盒子时在移动端叠住下方链接（如「学以致用」） */
        .chart-container {
            overflow: hidden;
            position: relative;
        }
        #radarChart {
            display: block;
            max-width: 100%;
            height: auto !important;
            pointer-events: none;
        }
        .chart-title { font-weight: 700; color: var(--primary); margin-bottom: 14px; font-size: 1rem; }
        .score-item { display: flex; align-items: center; margin-bottom: 15px; gap: 10px; }
        .score-letter { width: 40px; height: 40px; background: var(--bv-blue); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .score-bar-bg { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .score-bar-fill { height: 100%; background: linear-gradient(90deg, var(--bv-blue), var(--accent)); width: 0%; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .report-section {
            background: var(--white); border-radius: 24px; padding: 30px;
            margin-bottom: 20px; box-shadow: var(--shadow);
        }
        .report-section h3 {
            color: var(--primary); margin-bottom: 16px; font-size: 1.15rem;
            border-bottom: 2px solid var(--bv-light); padding-bottom: 10px;
        }
        .report-section p { color: var(--text-gray); line-height: 1.8; margin-bottom: 12px; }
        .report-section ul { margin-left: 20px; color: var(--text-gray); line-height: 1.8; }
        .report-section li { margin-bottom: 8px; }
        .tag-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-right: 8px; margin-bottom: 8px; }
        .tag-primary { background: var(--bv-light); color: var(--bv-blue); }
        .tag-accent { background: #fff8e6; color: #8a6e2b; }
        .tag-purple { background: var(--ai-light); color: var(--ai-purple); }
        .recommendation-card {
            background: var(--bv-light); padding: 20px; border-radius: 16px;
            margin-bottom: 16px; border-left: 4px solid var(--bv-blue);
        }
        .rec-title { font-weight: 700; color: var(--primary); margin-bottom: 10px; }
        .rec-content { color: var(--text-gray); line-height: 1.75; }
        .artistic-note {
            max-width: 640px; margin: 18px auto 0; text-align: left;
            background: linear-gradient(135deg, #faf5ff, #fff);
            border-left: 4px solid var(--ai-purple); border-radius: 14px;
            padding: 16px 18px; font-size: 0.92rem; line-height: 1.75; color: var(--text-gray);
        }
        .btn-outline {
            background: transparent; border: 2px solid var(--bv-blue);
            color: var(--bv-blue); padding: 12px 30px; border-radius: 50px;
            cursor: pointer; font-weight: 600; transition: all 0.3s; margin-top: 20px;
        }
        .btn-outline:hover { background: var(--bv-blue); color: white; }
        .priority-badge {
            display: inline-block; padding: 3px 12px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; margin-left: 10px;
        }
        .badge-p0 { background: #e6f0f8; color: var(--p0-color); }
        .badge-p1 { background: #e6f0f8; color: var(--p1-color); }
        .badge-p2 { background: var(--ai-light); color: var(--p2-color); }
        .rare-note {
            background: linear-gradient(135deg, #fff8e6, #fff);
            border: 1px solid var(--accent); border-radius: 14px;
            padding: 20px; margin: 15px 0;
        }
        .rare-note h4 { color: var(--accent); margin-bottom: 10px; }
        .rare-note p { color: var(--text-gray); line-height: 1.7; margin: 0; }
        .action-30 {
            background: linear-gradient(135deg, #f0f9ff, #fff);
            border-left: 3px solid var(--bv-blue); border-radius: 10px;
            padding: 12px 16px; margin: 10px 0; font-size: 0.9rem;
            color: var(--text-gray); line-height: 1.6;
        }
        .action-30 strong { color: var(--bv-blue); }
        /* 报告底部：学以致用 → 影响力行动卡（map01） */
        .plan-cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px 22px;
            flex-wrap: wrap;
            margin: 32px auto 12px;
            max-width: 720px;
            padding: 22px 28px;
            text-decoration: none;
            color: #fff;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--bv-blue), var(--secondary));
            box-shadow: 0 10px 36px rgba(0, 85, 164, 0.38);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid rgba(255, 255, 255, 0.22);
            position: relative;
            z-index: 2;
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0.2);
        }
        .plan-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 44px rgba(0, 85, 164, 0.48);
            color: #fff;
        }
        .plan-cta:focus-visible {
            outline: 3px solid var(--accent-light);
            outline-offset: 3px;
        }
        .plan-cta__icon {
            font-size: 2.6rem;
            line-height: 1;
        }
        .plan-cta__text {
            text-align: center;
            flex: 1 1 240px;
            min-width: 0;
        }
        .plan-cta__title {
            display: block;
            font-size: 1.18rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-bottom: 8px;
        }
        .plan-cta__sub {
            display: block;
            font-size: 0.96rem;
            opacity: 0.96;
            line-height: 1.6;
            font-weight: 400;
        }
        .plan-cta__arrow {
            font-size: 1.85rem;
            font-weight: 800;
            opacity: 0.92;
        }

        .top-ipo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 15px 0;
        }
        .cta-section {
            text-align: center;
            margin-top: 8px;
        }
        .cta-section h3 {
            color: var(--primary);
            font-size: 1.15rem;
            margin-bottom: 12px;
        }
        .cta-section p {
            color: var(--text-gray);
            line-height: 1.75;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .cta-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--bv-blue), var(--secondary));
            color: #fff !important;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 85, 164, 0.25);
            touch-action: manipulation;
        }

        @media (max-width: 768px) {
            body {
                padding-left: env(safe-area-inset-left, 0);
                padding-right: env(safe-area-inset-right, 0);
            }
            .container {
                padding: max(20px, env(safe-area-inset-top, 0)) 14px max(28px, env(safe-area-inset-bottom, 0));
                justify-content: flex-start;
                min-height: 100dvh;
                min-height: 100vh;
            }
            h1 { font-size: 1.55rem; }
            .subtitle { font-size: 0.95rem; margin-bottom: 18px; }
            .logo { width: 80px; height: 80px; font-size: 28px; margin-bottom: 18px; }
            .intro-card,
            .context-banner { padding: 18px 14px; }
            .context-banner { margin-bottom: 20px; }
            .intro-card h2 { font-size: 1.1rem; flex-wrap: wrap; }
            .radio-group { flex-direction: column; }
            .radio-card { min-width: 0; width: 100%; }
            .question-card { padding: 22px 14px; }
            .question-text { font-size: 1.08rem; margin-bottom: 18px; }
            .options-container { max-width: 100%; }
            .option-btn {
                min-height: 48px;
                align-items: center;
                touch-action: manipulation;
            }
            .option-btn:hover { transform: none; }
            .progress-container { padding: 14px; margin-bottom: 14px; }
            .result-grid { grid-template-columns: 1fr; gap: 18px; }
            .chart-container,
            .scores-container { padding: 14px; border-radius: 16px; }
            .chart-container { min-height: 220px; position: relative; }
            .report-section { padding: 16px 12px; border-radius: 18px; }
            .result-code { font-size: 2rem; letter-spacing: 3px; }
            .top-ipo-grid { grid-template-columns: 1fr; gap: 12px; }
            .plan-cta {
                margin: 22px 0 10px;
                padding: 16px 14px;
                gap: 12px;
                max-width: none;
                flex-direction: column;
                text-align: center;
                touch-action: manipulation;
            }
            .plan-cta__text { flex: 1 1 auto; }
            .plan-cta__icon { font-size: 2rem; }
            .plan-cta__title { font-size: 1rem; }
            .plan-cta__sub { font-size: 0.86rem; }
            .btn-primary {
                width: 100%;
                max-width: 400px;
                padding: 14px 24px;
                display: block;
                margin-left: auto;
                margin-right: auto;
                box-sizing: border-box;
                touch-action: manipulation;
            }
            .btn-outline {
                width: 100%;
                max-width: 400px;
                margin-top: 0;
                display: block;
                margin-left: auto;
                margin-right: auto;
                box-sizing: border-box;
                touch-action: manipulation;
            }
            .btn-group {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
                margin-top: 20px !important;
            }
            .cta-btn {
                width: 100%;
                max-width: 400px;
                box-sizing: border-box;
                text-align: center;
            }
            .artistic-note {
                margin-left: 0;
                margin-right: 0;
                padding: 14px;
                font-size: 0.88rem;
            }
        }

        @media (max-width: 420px) {
            .container { padding-left: 12px; padding-right: 12px; }
            h1 { font-size: 1.4rem; }
        }

        /* 屏幕端：说明如何用手机存 PDF（不进入打印页） */
        .print-help-banner {
            margin: 16px 0 8px;
            padding: 12px 14px;
            background: #f0f6fc;
            border: 1px solid #c5d7eb;
            border-radius: 12px;
            font-size: 0.88rem;
            line-height: 1.65;
            color: var(--text-gray);
            text-align: left;
        }
        .print-help-banner summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
        }
        .print-help-banner__body { margin-top: 10px; }
        .print-help-banner__body p { margin-bottom: 8px; }
        .print-help-banner__body p:last-child { margin-bottom: 0; }

        /* 打印用快照：平时不占位显示，避免与雷达 canvas 叠影 */
        .chart-print-snapshot {
            display: none;
        }

        @page {
            size: A4 portrait;
            margin: 10mm;
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            html,
            body {
                width: 100% !important;
                height: auto !important;
                min-height: 0 !important;
                max-height: none !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                background: #fff !important;
            }

            .container {
                max-width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                min-height: 0 !important;
                display: block !important;
                justify-content: flex-start !important;
            }

            .result-section {
                display: block !important;
                box-shadow: none !important;
            }

            .print-help-banner,
            .btn-group,
            .plan-cta {
                display: none !important;
            }

            .report-section,
            .chart-container,
            .scores-container,
            .cta-section,
            .artistic-note,
            .rare-note {
                box-shadow: none !important;
                page-break-inside: avoid;
            }

            .result-grid {
                gap: 12px !important;
            }

            .chart-container {
                min-height: 0 !important;
                position: relative !important;
            }

            /* 打印前注入的雷达图快照；隐藏原 canvas 避免手机端空白 */
            canvas#radarChart.chart-canvas--print-hidden {
                display: none !important;
            }

            .chart-print-snapshot {
                display: block !important;
                max-width: 100% !important;
                height: auto !important;
                margin: 0 auto !important;
                page-break-inside: avoid;
            }

            .cta-btn {
                border: 1px solid #ccc !important;
                color: #1a202c !important;
                background: #fff !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ==================== 配置区 ====================
    /** 岗位四类（与测评选项 value 一致） */
    const JOB_CATEGORIES = [
        '检验检测与认证类',
        '销售与市场类',
        '项目管理与运营支持类',
        '管理职能与支持类'
    ];
    /** 价值链/交付视角：检测、销售市场、项目交付与运营支持 */
    const FRONT_LINE_JOBS = ['检验检测与认证类', '销售与市场类', '项目管理与运营支持类'];
    const ROLE_TYPES = { individual: '个人贡献者', manager: '管理岗' };
    const CAREER_GOALS = { expert: '专家岗', manager: '管理岗' };

    const hollandCodes = {
        R: { name: '实际型', strengths: ['技术实操','问题解决','流程优化'] },
        I: { name: '研究型', strengths: ['数据分析','创新研究','系统思考'] },
        A: { name: '艺术型', strengths: ['创意设计','品牌塑造','用户体验'] },
        S: { name: '社会型', strengths: ['团队协作','人才培养','客户关系'] },
        E: { name: '企业型', strengths: ['项目管理','业务拓展','变革推动'] },
        C: { name: '常规型', strengths: ['质量控制','合规管理','运营效率'] }

            });
        } else if (roleType === 'individual' && !isExpertGoal) {
            advice.push({
                tag: '个人贡献者 → 管理岗',
                text: `您当前是个人贡献者，目标是管理岗。建议在深耕「${hollandCodes[topCode].name}」的同时，刻意练习「通过他人贡献」：主动带1个新人或虚拟小组，建立「目标-辅导-反馈」节奏；同时参与跨部门项目，积累协调资源与化解冲突的经验。`
            });
        } else if (roleType === 'manager' && isExpertGoal) {
            advice.push({
                tag: '管理岗 → 专家岗',
                text: `您当前是管理岗，目标是专家岗。建议在管理职责中保留「专业纵深」：每周固定时间做深度技术工作（如审阅核心报告、参与方法验证），避免完全脱离一线；同时把管理经验转化为可复用的「管理工具箱」（如会议模板、决策框架），成为「懂管理的专家」。`
            });

            advice.push({
                tag: '管理岗 → 更高管理岗',

                tag: '价值链视角',

            });
        } else {

                tag: '业务理解深化',
                text: `在${job}的支持角色上，安排「业务旁听计划」：例如旁听销售/项目经理例会、阅读典型标书与项目复盘、与一线同事做短访谈，整理「业务如何赚钱、风险在哪里、您所在岗位如何放大价值」一页纸；用业务语言重写一份您日常支持的工作说明，增强跨部门对话质量。`
            });
        }
        advice.push({
            tag: 'AI 协同',
            text: `将AI作为日常工作的「副驾驶」：针对「${job}」场景，固定1个高频任务（如${frontLine ? '标准条款比对、报告框架起草' : '会议纪要提炼、数据异常解释'}）用企业允许的AI工具建立模板与提示词库；每月做一次小复盘：哪些输出仍需人工终审、哪些已可稳定提效，逐步形成可分享的团队微流程。`

        });
        return advice;
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    function getSortedScoreLines(scores) {
        const order = ['R','I','A','S','E','C'];
        const list = order.map(code => ({ code, pct: Math.round((scores[code] / 50) * 100) }));
        list.sort((a, b) => b.pct - a.pct);
        return list;
    }
    function saveQuizData(data) {
        localStorage.setItem('bv_quiz_completed', 'true');
        localStorage.setItem('bv_quiz_data', JSON.stringify(data));
    }
    function loadQuizData() {
        const completed = localStorage.getItem('bv_quiz_completed');
        const data = localStorage.getItem('bv_quiz_data');
        if (completed === 'true' && data) return JSON.parse(data);
        return null;
    }
    function clearQuizData() {
        localStorage.removeItem('bv_quiz_completed');
        localStorage.removeItem('bv_quiz_data');

                <h1>必维职业发展规划测评</h1>
                <p class="subtitle">在VUCA时代探索您的可持续职业发展路径</p>

                <div class="context-banner">
                    <h3>🎯 培训背景与核心理念</h3>
                    <p>在VUCA（易变、不确定、复杂、模糊）环境下，必维正在经历组织架构变革。本测评帮助您理解：<strong>无论是否有晋升机会，您都可以通过改变贡献方式来建立个人影响力，实现可持续的职业发展。</strong></p>
                    <p style="margin-top: 10px; font-weight: 600;">💡 核心洞察：在职场中，影响力比职权更持久。真正的职业安全感来自于您能够影响他人、推动改变、创造价值的能力，而非职位头衔。</p>
                    <p style="margin-top: 12px;">请如实作答，答案无对错之分。</p>
                </div>

                <div class="intro-card">
                    <h2>💡 TOP模型：职业巅峰状态</h2>
                    <p>可持续职业发展的关键在于找到三个要素的交汇点：</p>
                    <div class="top-model">
                        <h4>您的职业巅峰状态 =</h4>
                        <ul>
                            <li><strong>T - Talent（天赋技能）：</strong>您天生擅长且乐在其中的能力</li>
                            <li><strong>O - Organizational Needs（组织需求）：</strong>必维当前及未来需要的能力</li>
                            <li><strong>P - Passion（工作热情）：</strong>您真正热爱并愿意投入的工作内容</li>
                        </ul>
                    </div>
                    <div class="influence-highlight">
                        <h4>🌟 为什么影响力是职业长久的关键？</h4>
                        <p>组织变革中，职位可能调整，部门可能重组，但<strong>个人的影响力是您可以随身携带的"职业资产"</strong>。通过改变贡献方式——从依靠他人到独立贡献，再到通过他人贡献，最终影响组织战略——您可以在任何岗位上持续扩大影响力半径，成为组织中不可或缺的"关键节点"。</p>
                    </div>
                    <div class="ai-highlight">
                        <h4>🤖 AI时代的影响力建设</h4>
                        <p>人工智能正在重塑检验检测认证行业。善于利用AI工具提升效率、创造新价值的人，将在新一轮职业洗牌中占据优势。<strong>将AI作为能力放大器，而非威胁</strong>，是当代职场人建立影响力的关键策略。</p>
                    </div>
                    <p>本测评通过<strong>霍兰德职业兴趣理论</strong>帮助您识别个人天赋与热情，结合您的岗位、岗位性质与职业目标，为您提供定制化的职业发展建议。</p>
                    <div class="vuca-note">
                        <h4>⚡ 关注"贡献方式"而非"职位"</h4>
                        <p>在组织变革期，职位边界变得模糊，但组织始终需要价值创造。通过调整贡献方式（依靠他人→独立→通过他人→战略层面），您可以在当前岗位上创造更大影响力，实现个人成长与组织发展的双赢。</p>
                    </div>

                    <div class="input-group">
                        <label for="jobCategorySelect">请选择您当前的岗位</label>
                        <select id="jobCategorySelect" required aria-label="岗位">
                            <option value="" disabled selected hidden></option>
                            ${JOB_CATEGORIES.map(j => `<option value="${j}">${j}</option>`).join('')}
                        </select>
                    </div>

                    <div class="input-group">
                        <label>请选择您的岗位性质</label>
                        <div class="radio-group">
                            <div class="radio-card" data-role="individual">
                                <span class="radio-title">个人贡献者</span>
                                <span class="radio-desc">以独立专业工作为主<br>不直接带团队</span>
                            </div>
                            <div class="radio-card" data-role="manager">
                                <span class="radio-title">管理岗</span>
                                <span class="radio-desc">带团队或负责部门管理<br>有人员管理职责</span>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>请选择您的职业目标</label>
                        <div class="radio-group">
                            <div class="radio-card" data-goal="expert">
                                <span class="radio-title">专家岗</span>
                                <span class="radio-desc">深耕专业领域<br>成为技术/业务专家</span>
                            </div>
                            <div class="radio-card" data-goal="manager">
                                <span class="radio-title">管理岗</span>
                                <span class="radio-desc">拓展管理半径<br>承担更大管理责任</span>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn-primary" id="startQuizBtn" disabled>开始测评</button>
            </div>
        `;

        let selectedRole = null;
        let selectedGoal = null;

        document.querySelectorAll('.radio-card[data-role]').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.radio-card[data-role]').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedRole = card.dataset.role;
                checkStart();
            });
        });

        document.querySelectorAll('.radio-card[data-goal]').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.radio-card[data-goal]').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedGoal = card.dataset.goal;
                checkStart();
            });
        });

        const jobSelect = document.getElementById('jobCategorySelect');
        const startBtn = document.getElementById('startQuizBtn');

        function checkStart() {
            startBtn.disabled = !(jobSelect.value && selectedRole && selectedGoal);
        }

        jobSelect.addEventListener('change', checkStart);
        startBtn.addEventListener('click', () => {
            if (jobSelect.value && selectedRole && selectedGoal) {
                startQuiz(jobSelect.value, selectedRole, selectedGoal);
            }
        });
    }

    // ==================== 测评流程 ====================
    let currentQuestions = [];
    let currentIndex = 0;
    let quizScores = { R:0, I:0, A:0, S:0, E:0, C:0 };
    let quizUserPos = '';
    let quizUserRole = '';
    let quizUserGoal = '';

    function startQuiz(pos, role, goal) {
        quizUserPos = pos;
        quizUserRole = role;
        quizUserGoal = goal;
        currentQuestions = shuffleArray([...questions]);
        currentIndex = 0;
        quizScores = { R:0, I:0, A:0, S:0, E:0, C:0 };
        renderQuizQuestion();
    }

    function renderQuizQuestion() {
        document.body.classList.remove('bv-report-view');
        const app = document.getElementById('app');
        if (currentIndex >= currentQuestions.length) {
            const scores = quizScores;
            const sorted = Object.keys(scores).sort((a,b) => scores[b]-scores[a]);
            const resultData = {
                userPosition: quizUserPos,
                userRoleType: quizUserRole,
                userCareerGoal: quizUserGoal,
                scores: scores,
                topCode: sorted[0],
                secondCode: sorted[1],
                thirdCode: sorted[2],
                completedAt: new Date().toISOString()
            };
            saveQuizData(resultData);
            initApp();
            return;
        }

        const q = currentQuestions[currentIndex];
        const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
        app.innerHTML = `
            <div class="quiz-section" style="display:block">
                <div class="progress-container">
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <div style="text-align:center; margin-top:10px">${currentIndex+1} / ${currentQuestions.length}</div>
                </div>
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="options-container" id="optionsContainer"></div>
                </div>
            </div>
        `;
        const optsContainer = document.getElementById('optionsContainer');
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `${opt.text}<span style="opacity:0.6">${opt.score}分</span>`;
            btn.onclick = () => {
                quizScores[q.code] += opt.score;
                currentIndex++;
                renderQuizQuestion();
            };
            optsContainer.appendChild(btn);
        });
    }

    function clearAndRestart() {
        clearQuizData();
        initApp();
    }

    function initApp() {
        const completedData = loadQuizData();
        if (!completedData) {
            renderIntro();
        } else {
            renderResult(completedData);
        }
    }

    window.clearAndRestart = clearAndRestart;

    function prepareChartPrintSnapshot() {
        var chart = window.__bvReportChart;
        var canvas = document.getElementById('radarChart');
        document.querySelectorAll('.chart-print-snapshot').forEach(function (el) { el.remove(); });
        if (canvas) canvas.classList.remove('chart-canvas--print-hidden');
        if (!chart || !canvas) return;
        var wrap = canvas.closest('.chart-container');
        if (!wrap) return;
        try {
            chart.resize();
            chart.update('none');
            var img = document.createElement('img');
            img.className = 'chart-print-snapshot';
            img.src = chart.toBase64Image('image/png', 1);
            img.alt = '兴趣分布雷达图';
            img.style.cssText = 'display:block;max-width:100%;height:auto;margin:8px auto 0';
            wrap.appendChild(img);
            canvas.classList.add('chart-canvas--print-hidden');
        } catch (err) {}
    }

    function cleanupChartPrintSnapshot() {
        document.querySelectorAll('.chart-print-snapshot').forEach(function (el) { el.remove(); });
        var canvas = document.getElementById('radarChart');
        if (canvas) canvas.classList.remove('chart-canvas--print-hidden');
        var ch = window.__bvReportChart;
        if (ch) try { ch.resize(); } catch (e2) {}
    }

    (function setupBvReportPrint() {
        if (window.__bvReportPrintBound) return;
        window.__bvReportPrintBound = true;
        window.addEventListener('beforeprint', prepareChartPrintSnapshot);
        window.addEventListener('afterprint', cleanupChartPrintSnapshot);
    })();

    window.printBvReport = function () {
        window.scrollTo(0, 0);
        prepareChartPrintSnapshot();
        requestAnimationFrame(function () {
            requestAnimationFrame(function () {
                window.print();
                setTimeout(cleanupChartPrintSnapshot, 8000);
            });
        });
    };

    initApp();
</script>
</body>
</html>
